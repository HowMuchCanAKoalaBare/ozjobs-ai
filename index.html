<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OzJobsAI – Fair Dinkum AI Risk for Aussie Jobs</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link href="style.css" rel="stylesheet">
  <style>
    body { margin:0; font-family: system-ui; background:#111; color:white; }
    header { background:#000; padding:20px; text-align:center; border-bottom:1px solid #333; }
    .legend { display:flex; justify-content:center; gap:20px; margin:20px 0; font-size:14px; }
    .legend span { display:flex; align-items:center; gap:8px; }
    .dot { width:16px; height:16px; border-radius:50%; }
  </style>
</head>
<body>
  <header>
    <h1 style="font-size:3rem; margin:0;">OzJobsAI</h1>
    <p style="color:#10b981; font-size:1.3rem;">AI Exposure for Australian Jobs – JSA official data (Sydney Lens Active)</p>
  </header>

  <div class="legend">
    <span><span class="dot" style="background:#10b981"></span> Safe as a koala (0-4)</span>
    <span><span class="dot" style="background:#f59e0b"></span> She’ll be right (4-6)</span>
    <span><span class="dot" style="background:#ef4444"></span> Shark-bait exposed (6-10)</span>
  </div>

  <div style="text-align:center; margin:20px;">
    <select id="stateFilter" style="background:#222; color:white; padding:12px; border-radius:8px; font-size:1.1rem;">
      <option value="All">All States</option>
      <option value="NSW" selected>NSW (Sydney Lens)</option>
      <option value="VIC">Victoria</option>
      <option value="QLD">Queensland</option>
      <option value="SA">South Australia</option>
      <option value="WA">Western Australia</option>
      <option value="TAS">Tasmania</option>
      <option value="NT">Northern Territory</option>
      <option value="ACT">ACT</option>
    </select>
    <input id="searchBox" placeholder="Search occupation (e.g. electrician)" 
           style="width:400px; background:#222; color:white; padding:12px; border-radius:8px; margin-left:20px; font-size:1.1rem;">
  </div>

  <div id="treemap" style="width:100%; height:calc(100vh - 260px);"></div>

  <script src="script.js"></script>
</body>
</html>
